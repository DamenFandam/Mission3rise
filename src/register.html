<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Videobelajar</title>
    <link rel="stylesheet" href="style/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#FFFDF3] antialiased">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center"
      >
        <img src="/src/asset/images/logo.png" alt="Logo" class="h-8 w-auto" />
        <div class="flex items-center gap-6">
          <a
            href="#"
            class="text-gray-600 font-medium hover:text-black transition"
            >Kategori</a
          >
          <img
            id="avatar"
            src="/src/asset/images/avatar.png"
            alt="user"
            class="h-10 w-10 rounded-md cursor-pointer object-cover"
          />
        </div>
      </div>
    </header>

    <main
      class="flex items-center justify-center min-h-[calc(100vh-80px)] px-4"
    >
      <div
        class="w-full max-w-md bg-white p-8 rounded-xl border border-gray-200 shadow-sm"
      >
        <div class="text-center mb-8">
          <h2 class="text-2xl font-bold text-gray-900">Masuk ke Akun</h2>
          <p class="text-gray-500 mt-2">
            Yuk, lanjutin belajarmu di videobelajar.
          </p>
        </div>
        <form action="#" class="space-y-5">
          <div>
            <label
              for="email"
              class="block text-gray-700 text-sm font-medium mb-1.5"
            >
              Nama Lengkap <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              id="name"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
              placeholder="Nama Lengkap Anda"
              required
            />
          </div>
          <div>
            <label
              for="email"
              class="block text-gray-700 text-sm font-medium mb-1.5"
            >
              E-Mail<span class="text-red-500">*</span>
            </label>
            <input
              type="email"
              id="email"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
              placeholder="nama@gmail.com"
              required
            />
          </div>
          <div>
            <label
              for="phone"
              class="block text-gray-700 text-sm font-medium mb-1.5"
            >
              No. Hp<span class="text-red-500">*</span>
            </label>
            <div class="flex shadow-sm">
              <div
                class="flex items-center border border-gray-300 border-r-0 rounded-l-lg bg-gray-500 px-4"
              >
                <img
                  src="/src/asset/images/Indonesia.png"
                  alt="ID"
                  class="h-4 w-6 object-cover rounded-sm"
                />
                <span class="ml-2 text-sm text-gray-600 font-medium">+62</span>
              </div>
              <input
                type="tel"
                id="phone"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
                placeholder="082261234567"
                required
              />
            </div>
          </div>
          <div>
            <label
              for="password"
              class="block text-gray-700 text-sm font-medium mb-1.5"
            >
              Kata Sandi <span class="text-red-500">*</span>
            </label>
            <input
              type="password"
              id="password"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
              placeholder="Buat Kata Sandi"
              required
            />
          </div>
          <div>
            <label
              for="confirm-password"
              class="block text-gray-700 text-sm font-medium mb-1.5"
            >
              Konfirmasi Kata Sandi <span class="text-red-500">*</span>
            </label>
            <input
              type="password"
              id="confirm-password"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
              placeholder="Ulangi Kata Sandi"
              required
            />
          </div>

          <div class="flex justify-end">
            <a
              href=""
              class="text-sm font-medium text-gray-500 hover:text-gray-900 transition"
              >Lupa Password?</a
            >
          </div>

          <div class="space-y-3 pt-2">
            <button
              type="submit"
              class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-md"
            >
              Daftar
            </button>
            <a
              href="./login.html"
              class="block w-full bg-green-100 hover:bg-green-200 text-green-700 font-bold py-3 px-4 rounded-md text-center"
              >Masuk</a
            >
          </div>

          <div class="relative flex items-center py-4">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-sm text-gray-400 text-sm"
              >atau</span
            >
            <div class="flex-grow border-t border-gray-200"></div>
          </div>
          <button
            class="w-full border py-2 rounded-md flex items-center justify-center gap-2 hover:bg-gray-50"
          >
            <img
              src="https://www.svgrepo.com/show/475656/google-color.svg"
              class="w-5 h-5"
            />
            <span class="text-sm">Masuk dengan Google</span>
          </button>
        </form>
      </div>
    </main>
  </body>
</html>
